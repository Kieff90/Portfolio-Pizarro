name: Deploy to IONOS via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Inject Deepgram key into api/deepgram.conf.php
        env:
          DEEPGRAM_KEY: ${{ secrets.DEEPGRAM_KEY }}
        run: |
          mkdir -p api
          if [ -z "$DEEPGRAM_KEY" ]; then
            echo "⚠️  DEEPGRAM_KEY secret not set — voice assistant will be unavailable."
            printf "<?php return ['key' => ''];\n" > api/deepgram.conf.php
          else
            printf "<?php return ['key' => '%s'];\n" "$DEEPGRAM_KEY" > api/deepgram.conf.php
          fi

      - name: Deploy via SFTP (lftp)
        env:
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            set net:max-retries 3;
            open sftp://su1172020:$SFTP_PASSWORD@access-5019887635.webspace-host.com;
            mirror --reverse --delete \
              --exclude-glob=.git \
              --exclude-glob=.github \
              --exclude-glob=.claude \
              --exclude-glob=.DS_Store \
              --exclude-glob='*.bak*' \
              --exclude-glob=.agent \
              --exclude-glob=.agents \
              --exclude-glob=skills-lock.json \
              --exclude-glob='*.mp4' \
              --exclude-glob='*.mov' \
              --exclude-glob=cloudflare \
              ./ /;
          "

      - name: Notify IndexNow (Bing/Yandex)
        run: |
          curl -s "https://api.indexnow.org/indexnow?url=https%3A%2F%2Fpedropizarrodiaz.it%2F&key=f7d3a2c8e1b94f56980c3a7d2e6f1b08" \
            -o /dev/null -w "IndexNow status: %{http_code}\n"
